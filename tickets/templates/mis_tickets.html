{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Mis Tickets</h2>
    <a href="/ticket/crear/" class="btn btn-success">+ Crear Ticket</a>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Título</th>
            <th>Categoría</th>
            <th>Estado</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for ticket in tickets %}
        <tr>
            <td>
                <a href="/mis-tickets/{{ ticket.id }}/">
                    {{ ticket.titulo }}
                </a>
            </td>
            <td>{{ ticket.categoria.nombre }}</td>
            <td>
                <span class="badge bg-secondary">{{ ticket.estado }}</span>
            </td>
            <td>{{ ticket.fecha_creacion }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No tienes tickets</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
